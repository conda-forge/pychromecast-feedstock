schema_version: 1

context:
  name: pychromecast
  version: "14.0.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: f05a1c8d727d4f104c8c731688053033e05157f2ab81bc8eef50ec0c62f9373c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - protobuf >=3.19.1,<4
    - zeroconf >=0.25.1
    - casttube >=0.2.0

tests:
  - python:
      imports:
        - pychromecast
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Python module to talk to Google Chromecast.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/balloob/pychromecast

extra:
  recipe-maintainers:
    - pavelzw
